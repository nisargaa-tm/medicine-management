<div class="container">
  <h1>Medicine Management</h1>

  <!-- Search Bar -->
  <div class="search-bar">
    <input type="text" [(ngModel)]="searchTerm" placeholder="Search by name" />
    <button (click)="search()">Search</button>
  </div>


  <!-- Medicines Table -->
  <table *ngIf="medicines.length > 0">
    <tr>
      <th>Name</th>
      <th>Expiry</th>
      <th>Quantity</th>
      <th>Price</th>
      <th>Brand</th>
    </tr>
    <tr *ngFor="let m of medicines"
        [ngClass]="{'expired': daysLeft(m.expiryDate) < 30, 'low-stock': m.quantity < 10}">
      <td>{{ m.fullName }}</td>
      <td>{{ m.expiryDate | date }}</td>
      <td>{{ m.quantity }}</td>
      <td>{{ m.price | number:'1.2-2' }}</td>
      <td>{{ m.brand }}</td>
    </tr>
  </table>

  <!-- Add Medicine Form -->
  <h2>Add New Medicine</h2>
  <form (ngSubmit)="addMedicine()">
    <input type="text" placeholder="Name" [(ngModel)]="newMedicine.fullName" name="fullName" required>
    <input type="text" placeholder="Brand" [(ngModel)]="newMedicine.brand" name="brand" required>
    <input type="number" placeholder="Quantity" [(ngModel)]="newMedicine.quantity" name="quantity" required>
    <input type="number" placeholder="Price" [(ngModel)]="newMedicine.price" name="price" required>
    <input type="date" [(ngModel)]="newMedicine.expiryDate" name="expiryDate" required>
    <textarea placeholder="Notes" [(ngModel)]="newMedicine.notes" name="notes"></textarea>
    <button type="submit">Add Medicine</button>
  </form>
</div>
